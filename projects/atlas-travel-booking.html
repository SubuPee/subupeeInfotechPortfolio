mart recommendations, dynamic pricing alerts, and seamless booking flow.\",\"audience\":\"Frequent travelers and adventure seekers aged 25-45.\",\"solution\":\"Created a unified travel platform with map-based exploration, AI itinerary builder, and a price prediction algorithm that saved users an average of 20% on bookings.\",\"features\":[\"Interactive map-based destination exploration\",\"AI-powered itinerary builder\",\"Dynamic pricing with prediction alerts\",\"Real-time flight and accommodation tracking\",\"Social sharing and collaborative trip planning\"],\"architecture\":\"Event-driven architecture with Celery for background tasks like price monitoring. Frontend uses React with Mapbox GL for interactive map experiences.\",\"process\":{\"planning\":\"Conducted user research with 200+ frequent travelers. Mapped the end-to-end booking journey to identify pain points.\",\"uiux\":\"Designed a map-first experience with contextual information panels. Used progressive disclosure to manage complexity.\",\"challenges\":\"Aggregating data from multiple travel APIs with different formats and rate limits. Real-time price tracking required efficient data pipelines.\",\"solutions\":\"Built a unified data normalization layer and implemented intelligent caching with TTL-based invalidation for price data.\"},\"results\":{\"performance\":\"Search results in under 2s. Real-time updates with 100ms latency.\",\"metrics\":\"Users saved an average of 22% on bookings through price alerts.\",\"growth\":\"50K registered users in 6 months. 4.8/5 app store rating.\"},\"liveUrl\":\"#\",\"githubUrl\":\"#\",\"screenshots\":[]},\"prevProject\":{\"slug\":\"vortex-ecommerce\",\"title\":\"Vortex E-Commerce\",\"tagline\":\"Next-generation shopping experience\",\"category\":\"E-commerce\",\"description\":\"A high-performance e-commerce platform with AR product previews, personalized recommendations, and seamless checkout experience.\",\"thumbnail\":\"/images/projects/vortex.jpg\",\"techStack\":{\"frontend\":[\"Next.js\",\"React\",\"Three.js\",\"Framer Motion\"],\"backend\":[\"Node.js\",\"NestJS\"],\"database\":[\"MongoDB\",\"Elasticsearch\"],\"apis\":[\"Stripe\",\"Shippo\",\"Algolia\"],\"deployment\":[\"Vercel\",\"AWS S3\",\"CloudFront\"]},\"problem\":\"Traditional e-commerce platforms offered flat product images and generic recommendations, leading to high return rates and low conversion.\",\"goal\":\"Create an immersive shopping experience with 3D/AR product visualization and AI-driven personalization to reduce returns by 30%.\",\"audience\":\"Fashion and furniture retailers targeting millennials and Gen-Z consumers.\",\"solution\":\"Built a WebGL-powered product viewer with AR capabilities, combined with a recommendation engine trained on user behavior patterns.\",\"features\":[\"3D product visualization with AR try-on\",\"AI-powered personalized recommendations\",\"One-click checkout with saved preferences\",\"Real-time inventory management\",\"Multi-currency and multi-language support\"],\"architecture\":\"JAMstack architecture with Next.js ISR for product pages. Headless CMS for content management with a separate microservice for recommendation engine.\",\"process\":{\"planning\":\"Analyzed competitor platforms and identified UX friction points. Defined a phased rollout starting with core e-commerce, then AR features.\",\"uiux\":\"Mobile-first design with gesture-based navigation. Created an immersive product detail page with 360-degree view as the centerpiece.\",\"challenges\":\"3D model loading performance was a bottleneck. AR feature required camera permissions and fallback for unsupported devices.\",\"solutions\":\"Implemented progressive loading with LOD (Level of Detail) for 3D models and a graceful degradation strategy for AR features.\"},\"results\":{\"performance\":\"Average page load time of 1.8s. 99.9% uptime.\",\"metrics\":\"28% reduction in product returns. 35% increase in conversion rate.\",\"growth\":\"150K monthly active users. Featured on ProductHunt with 500+ upvotes.\"},\"liveUrl\":\"#\",\"githubUrl\":\"#\",\"screenshots\":[]},\"nextProject\":{\"slug\":\"pulse-health-dashboard\",\"title\":\"Pulse Health Dashboard\",\"tagline\":\"Healthcare analytics at your fingertips\",\"category\":\"Web App\",\"description\":\"A real-time healthcare analytics dashboard for hospital administrators with patient flow tracking, resource management, and predictive analytics.\",\"thumbnail\":\"/images/projects/pulse.jpg\",\"techStack\":{\"frontend\":[\"React\",\"TypeScript\",\"D3.js\",\"Recharts\"],\"backend\":[\"Node.js\",\"Express\",\"Socket.io\"],\"database\":[\"PostgreSQL\",\"InfluxDB\"],\"apis\":[\"HL7 FHIR\",\"Twilio\",\"Auth0\"],\"deployment\":[\"AWS ECS\",\"CloudWatch\",\"Terraform\"]},\"problem\":\"Hospital administrators lacked real-time visibility into patient flow, bed availability, and resource utilization, leading to operational inefficiencies.\",\"goal\":\"Build a real-time dashboard that provides actionable insights to reduce patient wait times by 25% and improve resource utilization.\",\"audience\":\"Hospital administrators, department heads, and healthcare operations managers.\",\"solution\":\"Designed a real-time analytics platform with custom D3.js visualizations, predictive models for patient admission forecasting, and automated alert systems.\",\"features\":[\"Real-time patient flow visualization\",\"Predictive analytics for admission forecasting\",\"Automated resource allocation recommendations\",\"Custom report builder with export capabilities\",\"Role-based dashboards for different stakeholders\"],\"architecture\":\"Real-time data pipeline using Socket.io for live updates. InfluxDB for time-series data storage. Modular dashboard with configurable widget system.\",\"process\":{\"planning\":\"Worked with hospital staff for 3 weeks to understand workflows. Created data flow diagrams and defined KPIs with stakeholders.\",\"uiux\":\"Designed information-dense layouts with color-coded status indicators. Dark mode for 24/7 monitoring environments.\",\"challenges\":\"HIPAA compliance and data security were paramount. Real-time processing of high-volume medical events.\",\"solutions\":\"Implemented end-to-end encryption, audit logging, and data anonymization. Used stream processing for efficient real-time analytics.\"},\"results\":{\"performance\":\"Real-time updates with sub-second latency. 99.99% uptime SLA.\",\"metrics\":\"30% reduction in patient wait times. 20% improvement in bed utilization.\",\"growth\":\"Deployed in 12 hospitals. Processing 1M+ events per day.\"},\"liveUrl\":\"#\",\"githubUrl\":\"#\",\"screenshots\":[]}}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"2\",{\"name\":\"theme-color\",\"media\":\"(prefers-color-scheme: light)\",\"content\":\"#F8FAFC\"}],[\"$\",\"meta\",\"3\",{\"name\":\"theme-color\",\"media\":\"(prefers-color-scheme: dark)\",\"content\":\"#060B18\"}]]\n"])</script><script>self.__next_f.push([1,"b:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"Atlas Travel Booking | Subupee Infotech\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"An intelligent travel booking platform with dynamic pricing, personalized itinerary planning, and real-time flight tracking.\"}]]\n"])</script></body></html>
