uction in patient wait times. 20% improvement in bed utilization.\",\"growth\":\"Deployed in 12 hospitals. Processing 1M+ events per day.\"},\"liveUrl\":\"#\",\"githubUrl\":\"#\",\"screenshots\":[]},\"nextProject\":{\"slug\":\"flux-design-system\",\"title\":\"Flux Design System\",\"tagline\":\"Consistency at scale\",\"category\":\"UI/UX\",\"description\":\"A comprehensive design system and component library used across 5 products, featuring 80+ accessible components with dark/light theme support.\",\"thumbnail\":\"/images/projects/flux.jpg\",\"techStack\":{\"frontend\":[\"React\",\"TypeScript\",\"Storybook\",\"Radix UI\"],\"backend\":[\"N/A\"],\"database\":[\"N/A\"],\"apis\":[\"Figma API\",\"Chromatic\"],\"deployment\":[\"npm Registry\",\"Vercel\",\"Chromatic\"]},\"problem\":\"Multiple product teams were building inconsistent UIs with duplicated effort, leading to poor user experience and slow development velocity.\",\"goal\":\"Create a unified design system that reduces UI development time by 60% while ensuring accessibility and brand consistency across all products.\",\"audience\":\"Internal engineering and design teams across 5 product lines.\",\"solution\":\"Built a token-based design system with Radix UI primitives, comprehensive Storybook documentation, and automated visual regression testing.\",\"features\":[\"80+ accessible React components\",\"Token-based theming with dark/light mode\",\"Comprehensive Storybook documentation\",\"Automated visual regression testing\",\"Figma to code sync pipeline\"],\"architecture\":\"Monorepo with Turborepo for package management. Component packages organized by atomic design principles. CI/CD pipeline with automated publishing.\",\"process\":{\"planning\":\"Audited existing UIs across all 5 products. Identified common patterns and created a unified component taxonomy.\",\"uiux\":\"Designed tokens-first, then built components following atomic design. Created extensive usage guidelines and accessibility documentation.\",\"ch
